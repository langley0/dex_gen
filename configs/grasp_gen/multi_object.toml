# Sequential grasp_gen batch plan.
# Fill out [[targets]] with the objects/primitives you want to generate.

[run]
hand = "right"
backend = "gpu"
output_root = "outputs/grasp_gen_batch"
skip_existing = true

[optimizer]
batch = 8192
steps = 5000
points = 10
contact_count = 4
seed = 0
offset = 0.30
distance_weight = 1.0
equilibrium_weight = 1.0
penetration_weight = 100.0
wrench_iters = 24
sdf_voxel_size = 0.003
sdf_padding = 0.01
bench_steps = 0

[[targets]]
label = "cylinder_default"
primitive = "cylinder"

[[targets]]
label = "cube_s060"
primitive = "cube"
cube_size = 0.06

[[targets]]
label = "box_tall"
primitive = "box"
box_size = [0.05, 0.05, 0.12]

[[targets]]
label = "hex_prism"
asset = "hex_prism_r045_h120"

[[targets]]
label = "flat_ellipsoid"
asset = "flat_ellipsoid_080_080_035"

[[targets]]
label = "drill"
object = "drill"

[[targets]]
label = "decor01"
object = "decor01"
